name: Regenerate manifest

# Why this exists:
#   `content/manifest.json` is generated from the day files in `content/days/`.
#   Doing it on CI means contributors don't have to remember to run the script
#   before pushing — they just edit content and the manifest catches up.
#
# Loop protection:
#   The trigger excludes `content/manifest.json` itself, so the auto-commit
#   produced by this job does not retrigger the workflow.

on:
  push:
    branches: [main]
    paths:
      - 'content/days/**'
      - 'scripts/generate-manifest.py'
      - '.github/workflows/manifest.yml'
  pull_request:
    paths:
      - 'content/days/**'
      - 'scripts/generate-manifest.py'
      - '.github/workflows/manifest.yml'

permissions:
  contents: write

concurrency:
  group: manifest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN for the push. Personal repos with no
          # branch protection don't need a PAT here.
          token: ${{ secrets.GITHUB_TOKEN }}
          # Need full history so the push has something to fast-forward from.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate manifest
        run: python3 scripts/generate-manifest.py

      - name: Verify (PRs)
        if: github.event_name == 'pull_request'
        run: |
          # On PRs we can't always push back (forks, branch protection), so we
          # just assert the manifest the contributor committed matches what
          # the script produces. If it doesn't, fail with a clear hint.
          if ! git diff --quiet content/manifest.json; then
            echo "::error::content/manifest.json is stale. Run 'python3 scripts/generate-manifest.py' locally, commit, and push."
            git --no-pager diff content/manifest.json | head -50
            exit 1
          fi
          echo "Manifest is up to date."

      - name: Commit if changed (main)
        if: github.event_name == 'push'
        run: |
          if git diff --quiet content/manifest.json; then
            echo "Manifest already up to date — nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/manifest.json
          git commit -m "ci: regenerate manifest.json"
          git push
